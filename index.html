<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #f0f0f3;
    min-height: 100vh;
    padding: 20px 16px 40px;
    position: relative;
  }

  .bg-pattern {
    position: fixed; inset: 0;
    background-color: #f0f0f3;
    background-image: radial-gradient(circle at 1px 1px, rgba(180,180,200,0.16) 1px, transparent 0);
    background-size: 26px 26px;
    z-index: 0;
  }

  .wrapper {
    position: relative; z-index: 1;
    max-width: 480px; margin: 0 auto;
    display: flex; flex-direction: column; gap: 14px;
  }

  .page-title {
    font-size: 10px; letter-spacing: 1.6px; color: #aaa;
    text-transform: uppercase; padding: 0 2px;
  }
  .page-heading {
    font-size: 22px; font-weight: 600; color: #3a3a4a; letter-spacing: -0.5px;
    margin-top: 2px;
  }

  /* ── CARDS ── */
  .card {
    background: #f0f0f3; border-radius: 22px; padding: 22px;
    box-shadow: 6px 6px 16px rgba(174,174,192,0.42), -6px -6px 16px rgba(255,255,255,0.88);
  }

  .card-label {
    font-size: 10px; letter-spacing: 1.4px; color: #aaa;
    text-transform: uppercase; margin-bottom: 18px;
  }

  /* ── SCORES ── */
  .scores {
    display: flex; justify-content: space-around; align-items: center;
  }

  .score-item {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }

  .score-circle-wrap {
    position: relative; width: 86px; height: 86px;
    background: #f0f0f3; border-radius: 50%;
    box-shadow: 5px 5px 12px rgba(174,174,192,0.45), -5px -5px 12px rgba(255,255,255,0.9);
    display: flex; align-items: center; justify-content: center;
  }

  .score-circle-wrap svg {
    position: absolute; inset: 0;
    transform: rotate(-90deg);
    width: 86px; height: 86px;
  }

  .score-circle-wrap .bg {
    fill: none;
    stroke: rgba(180,180,192,0.2);
    stroke-width: 7;
  }

  .score-circle-wrap .fg {
    fill: none;
    stroke-width: 7;
    stroke-linecap: round;
    transition: stroke-dasharray 1.2s ease, stroke 0.5s ease;
  }

  .score-label {
    position: relative; z-index: 1;
    font-size: 14px; font-weight: 600; color: #3a3a4a;
    text-align: center;
  }

  .score-title {
    font-size: 11px; color: #aaa; text-align: center;
    letter-spacing: 0.5px;
  }

  /* ── SECTION LABEL ── */
  .section-label {
    font-size: 10px; letter-spacing: 1.6px; color: #aaa;
    text-transform: uppercase; padding: 0 2px;
  }

  /* ── HISTORIQUE ── */
  .historique {
    display: flex; flex-direction: column; gap: 10px;
    max-height: 340px; overflow-y: auto;
    padding-right: 2px;
  }

  .historique::-webkit-scrollbar { width: 3px; }
  .historique::-webkit-scrollbar-thumb {
    background: rgba(174,174,192,0.3); border-radius: 2px;
  }

  .meal-card {
    background: #f0f0f3; border-radius: 18px; padding: 12px 16px;
    box-shadow: 4px 4px 10px rgba(174,174,192,0.38), -4px -4px 10px rgba(255,255,255,0.85);
    display: flex; align-items: center; gap: 12px;
  }

  .meal-photo {
    width: 50px; height: 50px; border-radius: 14px;
    background: #f0f0f3; flex-shrink: 0;
    box-shadow: inset 3px 3px 7px rgba(174,174,192,0.35), inset -3px -3px 7px rgba(255,255,255,0.85);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; overflow: hidden;
  }

  .meal-photo img {
    width: 100%; height: 100%; object-fit: cover; border-radius: 14px;
  }

  .meal-info { flex: 1; min-width: 0; }

  .meal-name {
    font-size: 13px; font-weight: 600; color: #3a3a4a;
    margin-bottom: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .meal-ingredients {
    font-size: 11px; color: #aaa;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .meal-date {
    font-size: 10px; color: #bbb; flex-shrink: 0;
    letter-spacing: 0.3px;
  }

  .meal-delete {
    background: #f0f0f3; border: none; cursor: pointer;
    width: 30px; height: 30px; border-radius: 9px; flex-shrink: 0;
    box-shadow: 3px 3px 7px rgba(174,174,192,0.4), -3px -3px 7px rgba(255,255,255,0.9);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: #c77b7b;
    transition: box-shadow 0.15s;
  }

  .meal-delete:hover {
    box-shadow: inset 2px 2px 5px rgba(174,174,192,0.35), inset -2px -2px 5px rgba(255,255,255,0.85);
  }

  .empty-state {
    text-align: center; color: #bbb; font-size: 13px;
    padding: 30px 0; line-height: 1.7;
  }

  .loading-state {
    text-align: center; color: #bbb; font-size: 13px; padding: 24px 0;
  }

  /* ── BOUTON AJOUTER ── */
  .btn-add {
    width: 100%; padding: 15px;
    background: #f0f0f3; border: none; border-radius: 16px;
    color: #3a3a4a; font-size: 14px; font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    box-shadow: 5px 5px 14px rgba(174,174,192,0.42), -5px -5px 14px rgba(255,255,255,0.88);
    transition: box-shadow 0.15s;
    letter-spacing: 0.2px;
  }

  .btn-add:hover {
    box-shadow: 3px 3px 8px rgba(174,174,192,0.42), -3px -3px 8px rgba(255,255,255,0.88);
  }

  .btn-add:active {
    box-shadow: inset 4px 4px 10px rgba(174,174,192,0.35), inset -4px -4px 10px rgba(255,255,255,0.85);
  }

  /* ── POPUP ── */
  .popup-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(240,240,243,0.75);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 1000; align-items: center; justify-content: center; padding: 16px;
  }

  .popup-overlay.active { display: flex; }

  .popup {
    background: #f0f0f3; border-radius: 26px; padding: 28px 24px;
    width: 100%; max-width: 390px; max-height: 88vh; overflow-y: auto;
    box-shadow: 10px 10px 30px rgba(174,174,192,0.5), -10px -10px 30px rgba(255,255,255,0.95);
  }

  .popup-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 22px;
  }

  .popup-header h3 {
    font-size: 16px; font-weight: 600; color: #3a3a4a;
  }

  .popup-close {
    width: 32px; height: 32px; border-radius: 10px;
    background: #f0f0f3; border: none; cursor: pointer;
    box-shadow: 3px 3px 7px rgba(174,174,192,0.4), -3px -3px 7px rgba(255,255,255,0.9);
    font-size: 14px; color: #999;
    display: flex; align-items: center; justify-content: center;
  }

  .form-label {
    font-size: 10px; color: #aaa; text-transform: uppercase;
    letter-spacing: 1.2px; margin-bottom: 8px; display: block;
  }

  .form-input {
    width: 100%;
    background: #f0f0f3; border: none; border-radius: 12px;
    padding: 12px 14px; color: #3a3a4a; font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    margin-bottom: 16px; outline: none;
    box-shadow: inset 3px 3px 8px rgba(174,174,192,0.35), inset -3px -3px 8px rgba(255,255,255,0.85);
    transition: box-shadow 0.2s;
  }

  .form-input:focus {
    box-shadow: inset 4px 4px 10px rgba(174,174,192,0.4), inset -4px -4px 10px rgba(255,255,255,0.9);
  }

  .form-input::placeholder { color: #ccc; }

  .photo-btns { display: flex; gap: 10px; margin-bottom: 16px; }

  .photo-btn {
    flex: 1; padding: 12px 8px;
    background: #f0f0f3; border: none; border-radius: 14px;
    color: #888; font-size: 12px; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    text-align: center;
    box-shadow: 4px 4px 10px rgba(174,174,192,0.38), -4px -4px 10px rgba(255,255,255,0.88);
    transition: box-shadow 0.15s;
  }

  .photo-btn:hover {
    box-shadow: 2px 2px 6px rgba(174,174,192,0.38), -2px -2px 6px rgba(255,255,255,0.88);
  }

  .photo-btn .icon { font-size: 20px; display: block; margin-bottom: 5px; }

  .photo-preview {
    width: 100%; height: 130px; border-radius: 14px;
    object-fit: cover; margin-bottom: 16px; display: none;
  }

  .photo-preview.visible { display: block; }

  .ingredient-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .ingredient-row .form-input { margin-bottom: 0; flex: 1; }
  .ingredient-row .qty { width: 80px; flex: none; }

  .btn-add-ing {
    width: 100%; padding: 10px;
    background: #f0f0f3; border: none; border-radius: 12px;
    color: #aaa; font-size: 12px; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    margin-bottom: 18px;
    box-shadow: inset 2px 2px 6px rgba(174,174,192,0.3), inset -2px -2px 6px rgba(255,255,255,0.8);
    letter-spacing: 0.3px;
  }

  .btn-add-ing:hover { color: #3a3a4a; }

  .btn-save {
    width: 100%; padding: 14px;
    background: #f0f0f3; border: none; border-radius: 14px;
    color: #3a3a4a; font-size: 14px; font-weight: 600;
    font-family: 'DM Sans', sans-serif; cursor: pointer;
    box-shadow: 5px 5px 14px rgba(174,174,192,0.42), -5px -5px 14px rgba(255,255,255,0.88);
    transition: box-shadow 0.15s;
    letter-spacing: 0.2px;
  }

  .btn-save:hover {
    box-shadow: 3px 3px 8px rgba(174,174,192,0.42), -3px -3px 8px rgba(255,255,255,0.88);
  }

  .btn-save:active, .btn-save:disabled {
    box-shadow: inset 4px 4px 10px rgba(174,174,192,0.35), inset -4px -4px 10px rgba(255,255,255,0.85);
    color: #aaa; cursor: not-allowed;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #3a3a4a; color: #fff;
    padding: 11px 22px; border-radius: 20px;
    font-size: 13px; font-family: 'DM Sans', sans-serif;
    z-index: 2000; transition: transform 0.3s ease;
    box-shadow: 4px 4px 12px rgba(174,174,192,0.4);
  }

  .toast.show  { transform: translateX(-50%) translateY(0); }
  .toast.success { background: #5a9e6f; }
  .toast.error   { background: #c77b7b; }

  input[type="file"] { display: none; }
</style>
</head>
<body>

<div class="bg-pattern"></div>

<div class="wrapper">

  <div class="page-title">Suivi nutritionnel</div>
  <div class="page-heading">Mon alimentation</div>

  <!-- SCORES -->
  <div class="card">
    <div class="card-label">Scores de la semaine</div>
    <div class="scores">

      <div class="score-item">
        <div class="score-circle-wrap">
          <svg viewBox="0 0 86 86">
            <circle class="bg" cx="43" cy="43" r="35"/>
            <circle class="fg" id="circleVariete" cx="43" cy="43" r="35" stroke-dasharray="0 220"/>
          </svg>
          <div class="score-label" id="labelVariete">–</div>
        </div>
        <div class="score-title">Variété</div>
      </div>

      <div class="score-item">
        <div class="score-circle-wrap">
          <svg viewBox="0 0 86 86">
            <circle class="bg" cx="43" cy="43" r="35"/>
            <circle class="fg" id="circleQualite" cx="43" cy="43" r="35" stroke-dasharray="0 220"/>
          </svg>
          <div class="score-label" id="labelQualite">–</div>
        </div>
        <div class="score-title">Qualité</div>
      </div>

      <div class="score-item">
        <div class="score-circle-wrap">
          <svg viewBox="0 0 86 86">
            <circle class="bg" cx="43" cy="43" r="35"/>
            <circle class="fg" id="circlePertinence" cx="43" cy="43" r="35" stroke-dasharray="0 220"/>
          </svg>
          <div class="score-label" id="labelPertinence">–</div>
        </div>
        <div class="score-title">Pertinence</div>
      </div>

    </div>
  </div>

  <!-- HISTORIQUE -->
  <div class="section-label">Historique</div>

  <div class="card" style="padding: 18px;">
    <div class="historique" id="historique">
      <div class="loading-state">Chargement...</div>
    </div>
  </div>

  <button class="btn-add" onclick="ouvrirPopup()">+ Ajouter un plat</button>

</div>

<!-- POPUP -->
<div class="popup-overlay" id="popupOverlay" onclick="fermerPopupOverlay(event)">
  <div class="popup">
    <div class="popup-header">
      <h3>Ajouter un plat</h3>
      <button class="popup-close" onclick="fermerPopup()">✕</button>
    </div>

    <label class="form-label">Nom du plat</label>
    <input class="form-input" id="inputNom" type="text" placeholder="Ex: Poulet rôti aux légumes">

    <label class="form-label">Photo du plat</label>
    <div class="photo-btns">
      <div class="photo-btn" onclick="document.getElementById('inputCamera').click()">
        <span class="icon">📷</span>Prendre une photo
      </div>
      <div class="photo-btn" onclick="document.getElementById('inputGalerie').click()">
        <span class="icon">🖼️</span>Depuis la galerie
      </div>
    </div>
    <input type="file" id="inputCamera" accept="image/*" capture="environment" onchange="previewPhoto(this)">
    <input type="file" id="inputGalerie" accept="image/*" onchange="previewPhoto(this)">
    <img class="photo-preview" id="photoPreview" alt="Aperçu">

    <label class="form-label">Ingrédients</label>
    <div id="ingredientsList">
      <div class="ingredient-row">
        <input class="form-input" type="text" placeholder="Nom de l'ingrédient">
        <input class="form-input qty" type="number" placeholder="g" min="0">
      </div>
    </div>
    <button class="btn-add-ing" onclick="ajouterLigneIngredient()">+ Ajouter un ingrédient</button>
    <button class="btn-save" id="btnSave" onclick="enregistrerPlat()">Enregistrer</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL      = "https://hrsvcelmwdlcswwagxfa.supabase.co";
  const SUPABASE_KEY      = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhyc3ZjZWxtd2RsY3N3d2FneGZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MDAwMjgsImV4cCI6MjA5MDI3NjAyOH0._M1B_FOhNcgfUaBQFmr-VMGWETui-R28RSUGG553R1w";
  const CLOUDINARY_CLOUD  = "dujji1s6g";
  const CLOUDINARY_PRESET = "meal_photos";

  let USER_ID   = null;
  let photoFile = null;

  const params      = new URLSearchParams(window.location.search);
  const token       = params.get("token");
  const userIdParam = params.get("userId");

  /* ── couleur dynamique selon le score ── */
  function scoreColor(pct) {
    if (pct < 30) return "#c77b7b"; // rouge
    if (pct < 70) return "#d4a96a"; // orange
    return "#7bac8a";               // vert
  }

  /* ── résolution userId ── */
  async function resolveUserId() {
    if (userIdParam && userIdParam !== "null" && userIdParam !== "PLACEHOLDER") {
      return userIdParam;
    }
    if (token) {
      try {
        const res = await fetch(
          SUPABASE_URL + "/rest/v1/auth_tokens?token=eq." + token + "&select=user_id",
          { headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY } }
        );
        const data = await res.json();
        if (data && data.length > 0) return data[0].user_id;
      } catch(e) { console.log("Erreur token:", e.message); }
    }
    return null;
  }

  resolveUserId().then(id => {
    if (id) {
      USER_ID = id;
      init();
    } else {
      document.getElementById("historique").innerHTML =
        '<div class="empty-state">Connectez-vous pour voir votre suivi</div>';
    }
  });

  async function init() {
    document.getElementById("historique").innerHTML = '<div class="loading-state">Chargement...</div>';
    await Promise.all([chargerRepas(), chargerScores()]);
  }

  async function supabase(path, options = {}) {
    const res = await fetch(SUPABASE_URL + "/rest/v1/" + path, {
      ...options,
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY,
        "Content-Type": "application/json",
        "Prefer": "return=representation",
        ...(options.headers || {})
      }
    });
    if (!res.ok) throw new Error(await res.text());
    const text = await res.text();
    return text ? JSON.parse(text) : [];
  }

  async function chargerRepas() {
    try {
      const meals = await supabase(
        "meals?user_id=eq." + USER_ID + "&select=*,meal_ingredients(*)&order=created_at.desc"
      );
      afficherRepas(meals);
    } catch(e) {
      document.getElementById("historique").innerHTML =
        '<div class="empty-state">Erreur de chargement</div>';
    }
  }

  function afficherRepas(meals) {
    const el = document.getElementById("historique");
    if (!meals || meals.length === 0) {
      el.innerHTML = '<div class="empty-state">Aucun plat enregistré<br>Ajoutez votre premier repas !</div>';
      return;
    }
    el.innerHTML = meals.map(meal => {
      const ings    = meal.meal_ingredients || [];
      const ingText = ings.map(i => i.name + " " + i.quantity_g + "g").join(", ") || "Aucun ingrédient";
      const date    = new Date(meal.created_at).toLocaleDateString("fr-FR", { day: "numeric", month: "short" });
      const photo   = meal.photo_url
        ? '<div class="meal-photo"><img src="' + meal.photo_url + '" alt=""></div>'
        : '<div class="meal-photo">🍽️</div>';
      return (
        '<div class="meal-card">' +
          photo +
          '<div class="meal-info">' +
            '<div class="meal-name">' + meal.name + '</div>' +
            '<div class="meal-ingredients">' + ingText + '</div>' +
          '</div>' +
          '<div class="meal-date">' + date + '</div>' +
          '<button class="meal-delete" onclick="supprimerRepas(\'' + meal.id + '\')">🗑</button>' +
        '</div>'
      );
    }).join("");
  }

  async function chargerScores() {
    try {
      const scores = await supabase(
        "nutrition_scores?user_id=eq." + USER_ID + "&order=calculated_at.desc&limit=1"
      );
      if (scores && scores.length > 0) {
        afficherScore("Variete",    scores[0].variety_score);
        afficherScore("Qualite",    scores[0].quality_score);
        afficherScore("Pertinence", scores[0].relevance_score);
      }
    } catch(e) {}
  }

  function afficherScore(nom, valeur) {
    const pct     = Math.round(valeur || 0);
    const r       = 35;
    const circonf = 2 * Math.PI * r;
    const dash    = (pct / 100) * circonf;
    const couleur = scoreColor(pct);
    const circle  = document.getElementById("circle" + nom);
    const label   = document.getElementById("label"  + nom);
    if (circle) {
      circle.style.strokeDasharray = dash + " " + circonf;
      circle.style.stroke = couleur;
    }
    if (label) label.textContent = pct + "%";
  }

  async function recalculerScores() {
    try {
      const meals = await supabase(
        "meals?user_id=eq." + USER_ID + "&select=*,meal_ingredients(*)&order=created_at.desc&limit=30"
      );
      const sept    = new Date(); sept.setDate(sept.getDate() - 7);
      const recents = meals.filter(m => new Date(m.created_at) > sept);
      const uniques = new Set();
      recents.forEach(m => (m.meal_ingredients || []).forEach(i => uniques.add(i.name.toLowerCase())));
      const variete    = Math.min(100, (uniques.size / 15) * 100);
      const pertinence = Math.min(100, (recents.length / 21) * 100);
      const avecIng    = recents.filter(m => m.meal_ingredients && m.meal_ingredients.length > 0);
      const qualite    = recents.length > 0 ? Math.min(100, (avecIng.length / recents.length) * 100) : 0;
      const scoreData  = {
        user_id:         USER_ID,
        variety_score:   Math.round(variete),
        quality_score:   Math.round(qualite),
        relevance_score: Math.round(pertinence),
        score_date:      new Date().toISOString().split("T")[0],
        calculated_at:   new Date().toISOString()
      };
      await supabase("nutrition_scores", {
        method: "POST",
        headers: { "Prefer": "resolution=merge-duplicates,return=representation" },
        body: JSON.stringify(scoreData)
      });
      afficherScore("Variete",    scoreData.variety_score);
      afficherScore("Qualite",    scoreData.quality_score);
      afficherScore("Pertinence", scoreData.relevance_score);
    } catch(e) {}
  }

  /* ── POPUP ── */
  function ouvrirPopup() { document.getElementById("popupOverlay").classList.add("active"); resetPopup(); }
  function fermerPopup() { document.getElementById("popupOverlay").classList.remove("active"); }
  function fermerPopupOverlay(e) { if (e.target === document.getElementById("popupOverlay")) fermerPopup(); }

  function resetPopup() {
    document.getElementById("inputNom").value = "";
    document.getElementById("photoPreview").classList.remove("visible");
    document.getElementById("ingredientsList").innerHTML =
      '<div class="ingredient-row">' +
        '<input class="form-input" type="text" placeholder="Nom de l\'ingrédient">' +
        '<input class="form-input qty" type="number" placeholder="g" min="0">' +
      '</div>';
    photoFile = null;
  }

  function ajouterLigneIngredient() {
    const list = document.getElementById("ingredientsList");
    const row  = document.createElement("div");
    row.className = "ingredient-row";
    row.innerHTML =
      '<input class="form-input" type="text" placeholder="Nom de l\'ingrédient">' +
      '<input class="form-input qty" type="number" placeholder="g" min="0">';
    list.appendChild(row);
  }

  function previewPhoto(input) {
    const file = input.files[0];
    if (!file) return;
    photoFile = file;
    const reader = new FileReader();
    reader.onload = (e) => {
      const preview = document.getElementById("photoPreview");
      preview.src = e.target.result;
      preview.classList.add("visible");
    };
    reader.readAsDataURL(file);
  }

  async function uploadPhotoCloudinary(file) {
    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", CLOUDINARY_PRESET);
    const res  = await fetch(
      "https://api.cloudinary.com/v1_1/" + CLOUDINARY_CLOUD + "/image/upload",
      { method: "POST", body: formData }
    );
    const data = await res.json();
    if (!data.secure_url) throw new Error(data.error ? data.error.message : "Upload échoué");
    return data.secure_url;
  }

  async function enregistrerPlat() {
    if (!USER_ID) { showToast("Utilisateur non connecté", "error"); return; }
    const nom = document.getElementById("inputNom").value.trim();
    if (!nom)   { showToast("Donne un nom à ton plat !", "error"); return; }
    const btn = document.getElementById("btnSave");
    btn.disabled = true; btn.textContent = "Enregistrement...";
    try {
      let photoUrl = null;
      if (photoFile) {
        btn.textContent = "Upload photo...";
        photoUrl = await uploadPhotoCloudinary(photoFile);
      }
      const [meal] = await supabase("meals", {
        method: "POST",
        body: JSON.stringify({
          user_id:   USER_ID,
          name:      nom,
          photo_url: photoUrl,
          meal_date: new Date().toISOString().split("T")[0]
        })
      });
      const rows = document.querySelectorAll("#ingredientsList .ingredient-row");
      const ingredients = [];
      rows.forEach(row => {
        const inputs = row.querySelectorAll("input");
        const ingNom = inputs[0].value.trim();
        const qte    = parseFloat(inputs[1].value);
        if (ingNom && qte > 0) ingredients.push({ meal_id: meal.id, name: ingNom, quantity_g: qte });
      });
      if (ingredients.length > 0) {
        await supabase("meal_ingredients", { method: "POST", body: JSON.stringify(ingredients) });
      }
      await recalculerScores();
      await chargerRepas();
      fermerPopup();
      showToast("Plat enregistré !", "success");
    } catch(e) {
      showToast("Erreur : " + e.message, "error");
    } finally {
      btn.disabled = false; btn.textContent = "Enregistrer";
    }
  }

  async function supprimerRepas(mealId) {
    if (!confirm("Supprimer ce repas ?")) return;
    try {
      await supabase("meals?id=eq." + mealId, { method: "DELETE" });
      await recalculerScores();
      await chargerRepas();
      showToast("Repas supprimé", "success");
    } catch(e) { showToast("Erreur lors de la suppression", "error"); }
  }

  function showToast(msg, type) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className   = "toast " + (type || "");
    setTimeout(() => t.classList.add("show"), 10);
    setTimeout(() => t.classList.remove("show"), 3000);
  }
</script>
</body>
</html>
