<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Natty — Connexion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f0f0f3;
      --so: 6px 6px 16px rgba(174,174,192,0.42), -6px -6px 16px rgba(255,255,255,0.88);
      --si: inset 3px 3px 8px rgba(174,174,192,0.35), inset -3px -3px 8px rgba(255,255,255,0.85);
      --sm: 4px 4px 10px rgba(174,174,192,0.38), -4px -4px 10px rgba(255,255,255,0.85);
      --text: #2d2d3a; --muted: #9a9aaa; --black: #1a1a2e;
      --green: #34c759; --orange: #ff6b35;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      color: var(--text);
    }

    .card {
      width: 100%;
      max-width: 380px;
      background: var(--bg);
      border-radius: 28px;
      box-shadow: var(--so);
      padding: 40px 32px 36px;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 64px; height: 64px;
      background: var(--bg);
      border-radius: 20px;
      box-shadow: var(--so);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 14px;
    }
    .logo-title {
      font-size: 26px;
      font-weight: 800;
      color: var(--black);
      letter-spacing: -0.5px;
    }
    .logo-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    .tabs {
      display: flex;
      background: var(--bg);
      border-radius: 14px;
      box-shadow: var(--si);
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      border-radius: 11px;
      cursor: pointer;
      transition: all .2s;
      border: none;
      background: transparent;
    }
    .tab.active {
      background: var(--bg);
      box-shadow: var(--so);
      color: var(--black);
    }

    .form-group {
      margin-bottom: 16px;
    }
    .form-lbl {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 8px;
    }
    .form-inp {
      width: 100%;
      padding: 14px 16px;
      background: var(--bg);
      border: none;
      border-radius: 14px;
      box-shadow: var(--si);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--black);
      outline: none;
      transition: box-shadow .2s;
    }
    .form-inp:focus {
      box-shadow: var(--si), 0 0 0 2px rgba(255,107,53,0.15);
    }
    .form-inp::placeholder { color: var(--muted); }

    .btn-submit {
      width: 100%;
      padding: 16px;
      background: var(--black);
      color: #fff;
      border: none;
      border-radius: 16px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .2s, transform .1s;
      position: relative;
    }
    .btn-submit:active { transform: scale(.98); }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }

    .btn-google {
      width: 100%;
      padding: 14px;
      background: var(--bg);
      border: none;
      border-radius: 16px;
      box-shadow: var(--so);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--black);
      cursor: pointer;
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: box-shadow .2s;
    }
    .btn-google:active { box-shadow: var(--si); }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--muted);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(174,174,192,0.3);
    }

    .forgot {
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
      color: var(--muted);
    }
    .forgot a {
      color: var(--orange);
      text-decoration: none;
      font-weight: 600;
    }

    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--black);
      color: #fff;
      padding: 12px 20px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 600;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.err { background: #c0392b; }
    .toast.ok  { background: #2a9e4f; }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Reset password panel */
    .reset-panel {
      display: none;
    }
    .back-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      padding: 0;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">🥗</div>
    <div class="logo-title">Natty</div>
    <div class="logo-sub">Votre nutritionniste personnel</div>
  </div>

  <!-- Tabs connexion / inscription -->
  <div class="tabs" id="authTabs">
    <button class="tab active" id="tabLogin" onclick="switchTab('login')">Connexion</button>
    <button class="tab" id="tabSignup" onclick="switchTab('signup')">Inscription</button>
  </div>

  <!-- Formulaire connexion -->
  <div id="panelLogin">
    <div class="form-group">
      <div class="form-lbl">Email</div>
      <input class="form-inp" type="email" id="loginEmail" placeholder="votre@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <div class="form-lbl">Mot de passe</div>
      <input class="form-inp" type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-submit" id="btnLogin" onclick="doLogin()">Se connecter</button>

    <div class="divider">ou</div>
    <button class="btn-google" onclick="doGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
      Continuer avec Google
    </button>

    <div class="forgot">
      <a href="#" onclick="showReset(); return false;">Mot de passe oublié ?</a>
    </div>
  </div>

  <!-- Formulaire inscription -->
  <div id="panelSignup" style="display:none;">
    <div class="form-group">
      <div class="form-lbl">Prénom</div>
      <input class="form-inp" type="text" id="signupPrenom" placeholder="Votre prénom" autocomplete="given-name">
    </div>
    <div class="form-group">
      <div class="form-lbl">Email</div>
      <input class="form-inp" type="email" id="signupEmail" placeholder="votre@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <div class="form-lbl">Mot de passe</div>
      <input class="form-inp" type="password" id="signupPassword" placeholder="8 caractères minimum" autocomplete="new-password">
    </div>
    <button class="btn-submit" id="btnSignup" onclick="doSignup()">Créer mon compte</button>

    <div class="divider">ou</div>
    <button class="btn-google" onclick="doGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
      Continuer avec Google
    </button>
  </div>

  <!-- Reset password -->
  <div id="panelReset" style="display:none;">
    <button class="back-btn" onclick="hideReset()">← Retour</button>
    <div class="form-group">
      <div class="form-lbl">Votre email</div>
      <input class="form-inp" type="email" id="resetEmail" placeholder="votre@email.com">
    </div>
    <button class="btn-submit" id="btnReset" onclick="doReset()">Envoyer le lien</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SB_URL = 'https://hrsvcelmwdlcswwagxfa.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhyc3ZjZWxtd2RsY3N3d2FneGZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MDAwMjgsImV4cCI6MjA5MDI3NjAyOH0._M1B_FOhNcgfUaBQFmr-VMGWETui-R28RSUGG553R1w';

var currentTab = 'login';

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('panelLogin').style.display  = tab === 'login'  ? '' : 'none';
  document.getElementById('panelSignup').style.display = tab === 'signup' ? '' : 'none';
  document.getElementById('panelReset').style.display  = 'none';
  document.getElementById('authTabs').style.display    = '';
  document.getElementById('tabLogin').classList.toggle('active',  tab === 'login');
  document.getElementById('tabSignup').classList.toggle('active', tab === 'signup');
}

function showReset() {
  document.getElementById('panelLogin').style.display  = 'none';
  document.getElementById('panelSignup').style.display = 'none';
  document.getElementById('panelReset').style.display  = '';
  document.getElementById('authTabs').style.display    = 'none';
}
function hideReset() { switchTab('login'); }

function toast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type||'');
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

function setLoading(btnId, loading) {
  var btn = document.getElementById(btnId);
  if (loading) {
    btn.disabled = true;
    btn._txt = btn.textContent;
    btn.innerHTML = '<span class="spinner"></span>';
  } else {
    btn.disabled = false;
    btn.textContent = btn._txt || btn.textContent;
  }
}

function toHex(str) {
  return Array.from(str).map(function(c){ return c.charCodeAt(0).toString(16).padStart(2,'0'); }).join('');
}

function redirectToApp(userId) {
  var token = toHex(userId);
  window.location.href = 'index.html?token=' + token;
}

async function doLogin() {
  var email = document.getElementById('loginEmail').value.trim();
  var password = document.getElementById('loginPassword').value;
  if (!email || !password) { toast('Remplissez tous les champs', 'err'); return; }

  setLoading('btnLogin', true);
  try {
    var r = await fetch(SB_URL + '/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: password })
    });
    var data = await r.json();
    if (!r.ok) throw new Error(data.error_description || data.msg || 'Erreur de connexion');
    toast('Connexion réussie !', 'ok');
    setTimeout(function(){ redirectToApp(data.user.id); }, 600);
  } catch(e) {
    toast(e.message === 'Invalid login credentials' ? 'Email ou mot de passe incorrect' : e.message, 'err');
    setLoading('btnLogin', false);
  }
}

async function doSignup() {
  var prenom   = document.getElementById('signupPrenom').value.trim();
  var email    = document.getElementById('signupEmail').value.trim();
  var password = document.getElementById('signupPassword').value;
  if (!prenom || !email || !password) { toast('Remplissez tous les champs', 'err'); return; }
  if (password.length < 8) { toast('Mot de passe trop court (8 car. min)', 'err'); return; }

  setLoading('btnSignup', true);
  try {
    // Create account
    var r = await fetch(SB_URL + '/auth/v1/signup', {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: password })
    });
    var data = await r.json();
    if (!r.ok) throw new Error(data.msg || 'Erreur inscription');

    var userId = data.user && data.user.id;
    if (!userId) {
      // Email confirmation required
      toast('Vérifiez vos emails pour confirmer votre compte', 'ok');
      setLoading('btnSignup', false);
      return;
    }

    // Save prenom in onboarding
    try {
      await fetch(SB_URL + '/rest/v1/onboarding', {
        method: 'POST',
        headers: {
          'apikey': SB_KEY,
          'Authorization': 'Bearer ' + SB_KEY,
          'Content-Type': 'application/json',
          'Prefer': 'resolution=merge-duplicates'
        },
        body: JSON.stringify({ user_id: userId, prenom: prenom })
      });
    } catch(e) {}

    toast('Compte créé !', 'ok');
    setTimeout(function(){ redirectToApp(userId); }, 600);
  } catch(e) {
    toast(e.message, 'err');
    setLoading('btnSignup', false);
  }
}

async function doReset() {
  var email = document.getElementById('resetEmail').value.trim();
  if (!email) { toast('Entrez votre email', 'err'); return; }

  setLoading('btnReset', true);
  try {
    var r = await fetch(SB_URL + '/auth/v1/recover', {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email })
    });
    if (!r.ok) throw new Error('Erreur');
    toast('Lien envoyé ! Vérifiez vos emails.', 'ok');
    setTimeout(function(){ hideReset(); }, 2000);
  } catch(e) {
    toast('Erreur — vérifiez votre email', 'err');
  }
  setLoading('btnReset', false);
}

async function doGoogle() {
  // Redirect doit pointer vers Vercel, pas localhost
  var redirectTo = 'https://natty-suivi.vercel.app/login.html?oauth=1';
  window.location.href = SB_URL + '/auth/v1/authorize?provider=google&redirect_to=' + encodeURIComponent(redirectTo);
}

// Handle OAuth callback
(function() {
  var params = new URLSearchParams(window.location.search);
  var hash = new URLSearchParams(window.location.hash.replace('#',''));

  // OAuth callback — token in URL hash after Supabase redirect
  var accessToken = hash.get('access_token');
  if (accessToken) {
    fetch(SB_URL + '/auth/v1/user', {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + accessToken }
    }).then(function(r){ return r.json(); }).then(function(u){
      if (u && u.id) {
        toast('Connexion Google réussie !', 'ok');
        setTimeout(function(){ redirectToApp(u.id); }, 600);
      } else {
        toast('Erreur: utilisateur introuvable', 'err');
      }
    }).catch(function(){
      toast('Erreur OAuth', 'err');
    });
    return;
  }
  // Also check for error in hash
  var errDesc = hash.get('error_description');
  if (errDesc) {
    toast(errDesc, 'err');
  }

  // Enter key on inputs
  document.addEventListener('keydown', function(e) {
    if (e.key !== 'Enter') return;
    if (currentTab === 'login') doLogin();
    else if (currentTab === 'signup') doSignup();
    else if (document.getElementById('panelReset').style.display !== 'none') doReset();
  });
})();
</script>
</body>
</html>
